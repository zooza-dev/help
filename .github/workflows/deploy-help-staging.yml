name: Deploy Help to Staging

on:
  push:
    branches:
      - test
    paths:
      - 'content/**'
      - 'assets/**'
      - 'scripts/export/build_docusaurus.py'
  workflow_dispatch:

jobs:
  deploy:
    runs-on: self-hosted

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Generate Docusaurus export
        run: python3 scripts/export/build_docusaurus.py --clean --staging

      - name: Install Node dependencies
        working-directory: build/exports/docusaurus
        run: npm install --legacy-peer-deps

      - name: Build site
        working-directory: build/exports/docusaurus
        run: npm run build

      - name: Deploy via FTP
        timeout-minutes: 15
        working-directory: build/exports/docusaurus
        env:
          SFTP_USER: ${{ secrets.SFTP_USER }}
          SFTP_PASSWORD: ${{ secrets.SFTP_PASSWORD }}
          SFTP_HOST: ${{ secrets.SFTP_HOST }}
        run: |
          lftp -u "$SFTP_USER,$SFTP_PASSWORD" \
            -e "set ssl:verify-certificate no; \
                set net:timeout 30; \
                set net:max-retries 2; \
                set mirror:parallel-transfer-count 5; \
                mirror --reverse --delete --verbose ./dist/ /zooza.online/sub/staging-help/; \
                quit" \
            ftp://$SFTP_HOST
