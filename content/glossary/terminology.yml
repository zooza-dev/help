# ──────────────────────────────────────────────
# ENTITY MISATTRIBUTION PATTERNS (AI use only)
# ──────────────────────────────────────────────
# People often name the wrong entity. These patterns map natural language
# to the correct technical entity and action.

entity_misattribution:

  - pattern: "add a new client / pridať klienta / adăuga un client / ügyfél hozzáadása"
    actual_entity: "Booking (creates Client automatically)"
    actual_action: "Create booking → New client step"
    clarification: >
      There is no standalone 'Add client' button in Zooza.
      Client records are created automatically when a booking is made.
      To add a new client manually:
      1. Go to Bookings → Create booking.
      2. At the 'Choose the client' step, select 'New client'.
      3. Enter name, surname, email (required), and phone.
      4. Complete the booking.
      If only the client profile is needed (no active booking), create the booking
      for any class and delete the booking afterwards — the client profile remains.
      Note: the booking form has multiple steps (Choose class → Choose the client →
      details). 'New client' appears at the 'Choose the client' step, not the first step.
    intent_keywords:
      en: ["add client", "add new client", "create client", "no add client button", "how to add a client"]
      sk: ["pridať klienta", "vytvoriť klienta", "ako pridať klienta", "nový klient"]
      cz: ["přidat klienta", "vytvořit klienta", "jak přidat klienta", "nový klient"]
      ro: ["adaug un client", "adăuga un client", "cum adaug client", "client nou"]
      hu: ["ügyfél hozzáadása", "új ügyfél", "hogyan adjak hozzá ügyfelet"]

  - pattern: "copy a client / kopírovať klienta"
    actual_entity: "Booking"
    actual_action: "Copy"
    clarification: "Do you want to copy the booking/registration to another class?"
    intent_keywords:
      en: ["copy client", "copy a client", "copy the client"]
      sk: ["kopírovať klienta", "skopírovať klienta"]

  - pattern: "move a child / presunúť dieťa / move a client"
    actual_entity: "Booking"
    actual_action: "Transfer"
    clarification: "Do you want to move the registration to another class?"
    intent_keywords:
      en: ["move child", "move my child", "move client", "move a client"]
      sk: ["presunúť dieťa", "prehodiť dieťa", "presunúť klienta", "prehodiť klienta"]
      de: ["Kind verschieben", "Kunde verschieben", "umbuchen"]

  - pattern: "add client to another group / pridať klienta do inej skupiny"
    actual_entity: "Booking"
    actual_action: "Copy"
    clarification: "Do you want to copy the booking so the client is enrolled in both classes?"
    intent_keywords:
      en: ["add to another group", "add client to another class", "enrol in two groups"]
      sk: ["pridať do inej skupiny", "zaradiť do ďalšej skupiny", "prihlásiť aj do inej skupiny"]

  - pattern: "cancel a client / zrušiť klienta"
    actual_entity: "Booking"
    actual_action: "Cancel booking"
    clarification: "Do you want to cancel the client's booking/registration?"
    intent_keywords:
      en: ["cancel client", "cancel the client", "remove client from class"]
      sk: ["zrušiť klienta", "odstrániť klienta zo skupiny", "odhlásiť klienta"]

  - pattern: "delete a client / vymazať klienta"
    actual_entity: "Booking or Client"
    actual_action: "Clarify"
    clarification: >
      Ask: 'Do you want to cancel the booking (remove from class) or permanently
      delete the client record?' These are different actions.
    intent_keywords:
      en: ["delete client", "remove client", "delete the client"]
      sk: ["vymazať klienta", "zmazať klienta", "odstrániť klienta"]

  - pattern: "give a client a free session / dať klientovi termín zadarmo"
    actual_entity: "Booking"
    actual_action: "Free credits or Make-up session — clarify"
    clarification: >
      Ask: 'Is this a replacement for a missed session (make-up) or an extra
      session as a gift/allowance (free credits)?' These are managed differently.
    intent_keywords:
      en: ["free session", "free lesson", "give free class", "complimentary session"]
      sk: ["dať termín zadarmo", "bezplatný termín", "hodina zadarmo", "voľný termín"]

  - pattern: "delete/remove/zmazať/vymazať programme/kurz/program/curs/kurzus"
    actual_entity: "Programme"
    actual_action: "Archive (or request deletion from support)"
    clarification: >
      Programmes cannot be deleted directly in the app.
      Archive hides the programme from the active list but keeps all data.
      Permanent deletion is only possible for programmes with no bookings and no
      classes, and must be requested from the support team with the programme ID.
      Ask: 'Do you want to archive it (hide from active list) or permanently
      remove it (requires no bookings, contact support)?'
    intent_keywords:
      en: ["delete programme", "remove programme", "delete course", "remove course"]
      sk: ["zmazať program", "vymazať program", "zmazať kurz", "odstrániť kurz"]
      cz: ["smazat kurz", "odstranit kurz", "vymazat kurz"]
      ro: ["șterge curs", "elimina curs"]
      hu: ["törölni kurzus", "törölni program", "kurzust törölni"]

  - pattern: "delete/remove a group / törölni group / zmazať skupinu"
    actual_entity: "Class"
    actual_action: "Archive Class (or delete if no bookings)"
    clarification: >
      'Group' is a deprecated term for Class. When a customer says 'delete a group',
      they mean delete/archive a Class. A Class cannot be deleted if it has active
      bookings — it must be archived first or bookings reassigned.
    intent_keywords:
      en: ["delete group", "remove group"]
      sk: ["zmazať skupinu", "vymazať skupinu"]
      hu: ["törölni csoport", "csoportot törölni", "group törölni"]

  - pattern: "remove location from course/class / odstrániť lokáciu z kurzu"
    actual_entity: "Class (Venue assignment)"
    actual_action: "Assign a placeholder Venue — Venue cannot be left blank"
    clarification: >
      A Class always requires a Venue — it cannot be left empty.
      The correct solution is to create a placeholder/phantom Venue in
      Settings → Locations (e.g. 'Online', 'TBD', or leave the name neutral)
      and assign it to the Class. Whatever name is set there will be displayed.
      You cannot 'remove' a venue; you replace it with a neutral placeholder.
      Never suggest deleting the Venue from Settings if it is used elsewhere.
    intent_keywords:
      en: ["remove location", "delete location from course", "remove venue", "no location", "clear location"]
      sk: ["odstrániť lokáciu", "zmazať miesto", "bez lokácie", "odstrániť miesto z kurzu"]
      cz: ["odebrat lokaci", "smazat místo", "bez místa", "odstranit lokaci z kurzu"]
      hu: ["helyszín eltávolítása", "helyszín törlése", "hely törlése kurzusból"]

  - pattern: "change trial/ukázková hodina price to 0 / zmeniť cenu skúšobnej hodiny na 0"
    actual_entity: "Class price vs. Programme price"
    actual_action: "Clarify — setting 0 at Class level is treated as 'not set', falls back to Programme price"
    clarification: >
      Pricing hierarchy:
      - If price is set at Class level (any non-zero value) → Class price OVERRIDES Programme price.
      - If price is NOT set at Programme → Class price is used.
      - EDGE CASE: Setting price to 0 at Class level is treated as 'not set' (empty),
        so the system falls back to the Programme price. You cannot make a class free
        by setting 0 at Class level if the Programme has a price.
      Three solutions to get price 0 on a specific class:
      1. Set price to 0 at Programme level — then manage all pricing differences at Class level.
      2. Move the Class into a separate Programme that has no price set, and set 0 at Class level.
      3. Use the Zooza Trial feature — Trials have their own independent price (can be 0),
         fully separate from Programme pricing.
      Ask: 'Is this class meant to be a Zooza Trial, or a regular class you want free?'
    intent_keywords:
      en: ["trial price", "change price to 0", "free trial", "set price zero", "trial session price"]
      sk: ["cena skúšobnej hodiny", "zmeniť cenu na 0", "zadarmo skúšobná", "nulová cena"]
      cz: ["cena ukázkové hodiny", "změnit cenu na 0", "zkušební hodina zadarmo", "nulová cena"]

  - pattern: "skúšobná hodina / zkušební hodina / ukázková hodina — ambiguous"
    actual_entity: "Trial (feature) OR manually created Session"
    actual_action: "Clarify before answering"
    clarification: >
      Ask: 'Is this set up as a Zooza Trial (with its own registration form and
      automated follow-up to enrolment), or did you create a regular session and
      name it skúšobná/zkušební hodina?'
      These are entirely different: Zooza Trial has automation; manual session does not.
    intent_keywords:
      sk: ["skúšobná hodina", "skušobna hodina"]
      cz: ["zkušební hodina", "ukázková hodina", "zkusebn"]
      hu: ["próbaóra", "bemutató óra"]

  - pattern: "náhrada vs prenos náhrady — SK/CZ ambiguity"
    actual_entity: "Make-up session OR Transferred make-up session"
    actual_action: "Clarify: within current period or carry-over to next period?"
    clarification: >
      'Náhrada' (SK/CZ) = standard make-up session: the client picks an available slot
      within the current class period from classes that have spare capacity.
      'Prenos náhrady' (SK/CZ) = transferred make-up session: unused make-up credits
      are carried over to the NEXT class or billing period when the current class ends.
      This is configured in Settings → Make-up sessions → General Settings:
      - 'Maximum number of transferred make-up sessions between billing periods' (0 = disabled)
      - 'Number of days to use transferred make-up sessions'
      If the customer asks about 'prenos náhrady', they are almost certainly asking about
      the inter-period carry-over feature, NOT about custom replacement lesson proposals.
    intent_keywords:
      sk: ["prenos náhrady", "náhrada", "náhradná hodina", "náhrady do ďalšieho obdobia", "preniesť náhrady"]
      cz: ["přenos náhrady", "náhrada", "náhradní hodina", "náhrady do dalšího období", "přenést náhrady"]

  - pattern: "groups disappeared from calendar / skupiny zmizli z kalendára"
    actual_entity: "Browser cache"
    actual_action: "Hard browser refresh"
    clarification: >
      This is a browser caching issue, not a data or filter problem. No classes have been lost.
      Instruct the admin to do a hard browser refresh:
      Mac: Cmd+R or Cmd+Shift+R. Windows/Linux: Ctrl+R, Ctrl+F5, or F5.
      Data is intact — the page just needs to reload to show current state.
    intent_keywords:
      en: ["groups disappeared", "classes missing from calendar", "calendar not showing", "calendar shows wrong data"]
      sk: ["skupiny zmizli z kalendára", "nevidím všetky skupiny", "kalendár sa nezobrazuje správne"]
      cz: ["skupiny zmizely z kalendáře", "nevidím všechny skupiny", "kalendář se nezobrazuje správně"]

  - pattern: "discount code / slevový kód / zľavový kód — location"
    actual_entity: "Discount code"
    actual_action: "Go to Sales & Payments → Discounts"
    clarification: >
      Discount codes in Zooza are found under: Sales & Payments → Discounts → Discount Codes.
      Do NOT redirect to Product Builder, programme settings, or payment templates.
      Do NOT describe 'automatic discounts', sibling discounts, or early-bird settings
      unless the customer specifically asks for those — discount codes are a separate feature.
      Discount codes are entered by clients during checkout on the booking form.
      To create: Sales & Payments → Discounts → Discount Codes → Create.
      To track usage: same section shows usage count and redemption history.
