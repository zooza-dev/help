  - pattern: "Settings → Registration Forms / Beállítások → Regisztrációs űrlapok — path does not exist"
    actual_entity: "Booking form settings (split across multiple locations)"
    actual_action: "Route to correct location based on what they want to change"
    clarification: >
      There is NO 'Settings → Registration Forms' menu in Zooza. FIN must not direct users there.
      Booking form configuration is split:
      - Global appearance (button text, availability, CSS, discount code field):
        Team & Settings → Publish → click widget → Configure next to Booking form.
      - What extra data is collected (date of birth, address, custom questions):
        Programmes → programme → Additional Fields → Edit.
      - Standard field labels (Name, Surname, Email, Phone, Note), class visibility,
        multiple children per form, confirmation email:
        Programmes → programme → Online Booking → Edit → Customize Booking Form.
      - Price, booking fee, payment method:
        Programmes → programme → Settings → Price and Payment.
      Ask: 'What specifically do you want to change on the form?' then route accordingly.
      See also: booking-form-settings guide at /help/widgets/booking-form-settings.
    intent_keywords:
      en: ["where is registration form settings", "booking form settings", "registration form configuration", "where to configure booking form"]
