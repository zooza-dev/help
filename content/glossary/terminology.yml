  - pattern: "add field to registration form / pridať pole / add new field"
    actual_entity: "Additional Fields (per programme)"
    actual_action: "Go to Programmes → programme → Additional Fields → Edit"
    clarification: >
      To add custom fields to the booking form, go to:
      Programmes → open the programme → Additional Fields → Edit.
      You can add up to 5 custom fields. These are per-programme — to use the same
      fields across multiple programmes, set up one programme then use Copy Programme.
      Do NOT direct users to Settings → Publish for adding fields — that section
      controls global widget appearance only (button text, availability display, CSS).
    intent_keywords:
